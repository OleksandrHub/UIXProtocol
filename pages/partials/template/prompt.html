<template id="promptItemTpl">
  <div class="prompt-item">
    <div class="prompt-item__head">
      <input type="radio" name="activePrompt" class="prompt-active" />
      <input type="text" class="prompt-name" placeholder="Назва" />
      <button type="button" class="prompt-delete" title="Видалити">×</button>
    </div>
    <textarea class="prompt-text" rows="6" placeholder="Текст промту"></textarea>
  </div>
</template>
