<section class="tab-panel" data-panel="appearance" hidden>
  <h3>Варіанти вигляду відповіді</h3>
  <div class="variants-bar">
    <select id="variantSelect" aria-label="Активний варіант"></select>
    <button type="button" id="variantAdd" title="Додати новий варіант">+</button>
    <button type="button" id="variantRename" title="Перейменувати поточний">✎</button>
    <button type="button" id="variantDelete" title="Видалити поточний">×</button>
  </div>
  <p class="hint">Alt+R — наступний варіант по колу.</p>

  <h3>Відповідь Gemini</h3>
  <div class="grid-2">
    <label
      >Шрифт
      <input type="text" id="apResultFont" placeholder="system-ui" />
    </label>
    <label
      >Розмір (px)
      <input type="number" id="apResultSize" min="8" max="64" />
    </label>
    <label class="color-row"
      >Колір тексту
      <span class="color-row__inputs">
        <input type="color" id="apResultColor" />
        <input
          type="range"
          id="apResultColorOpacity"
          min="0"
          max="100"
          step="1"
          title="Прозорість тексту"
        />
        <output id="apResultColorOpacityOut" class="opacity-out">100%</output>
      </span>
    </label>
    <label class="color-row"
      >Колір фону
      <span class="color-row__inputs">
        <input type="color" id="apResultBg" />
        <input
          type="range"
          id="apResultBgOpacity"
          min="0"
          max="100"
          step="1"
          title="Прозорість фону"
        />
        <output id="apResultBgOpacityOut" class="opacity-out">0%</output>
      </span>
    </label>
  </div>

  <h3>Кнопка S (скріншот)</h3>
  <div class="grid-2">
    <label
      >Шрифт
      <input type="text" id="apBtnFont" placeholder="system-ui" />
    </label>
    <label
      >Розмір (px)
      <input type="number" id="apBtnSize" min="8" max="64" />
    </label>
    <label class="color-row"
      >Колір тексту
      <span class="color-row__inputs">
        <input type="color" id="apBtnColor" />
        <input
          type="range"
          id="apBtnColorOpacity"
          min="0"
          max="100"
          step="1"
          title="Прозорість тексту"
        />
        <output id="apBtnColorOpacityOut" class="opacity-out">100%</output>
      </span>
    </label>
    <label class="color-row"
      >Колір фону
      <span class="color-row__inputs">
        <input type="color" id="apBtnBg" />
        <input
          type="range"
          id="apBtnBgOpacity"
          min="0"
          max="100"
          step="1"
          title="Прозорість фону"
        />
        <output id="apBtnBgOpacityOut" class="opacity-out">0%</output>
      </span>
    </label>
  </div>

  <h3>Кнопка Д у режимі друга (активний стан)</h3>
  <div class="grid-2">
    <label class="color-row"
      >Колір тексту
      <span class="color-row__inputs">
        <input type="color" id="apFriendActiveColor" />
        <input
          type="range"
          id="apFriendActiveColorOpacity"
          min="0"
          max="100"
          step="1"
          title="Прозорість тексту"
        />
        <output id="apFriendActiveColorOpacityOut" class="opacity-out">100%</output>
      </span>
    </label>
    <label class="color-row"
      >Колір фону
      <span class="color-row__inputs">
        <input type="color" id="apFriendActiveBg" />
        <input
          type="range"
          id="apFriendActiveBgOpacity"
          min="0"
          max="100"
          step="1"
          title="Прозорість фону"
        />
        <output id="apFriendActiveBgOpacityOut" class="opacity-out">100%</output>
      </span>
    </label>
  </div>

  <p class="hint">Прозорість 0% — повністю прозоро, 100% — без прозорості. Неактивний стан Д використовує ті ж кольори що й S.</p>

  <h3>Індикатори</h3>
  <label class="check"
    ><input type="checkbox" id="apShowFilesStatus" /> Показувати статус файлів (📎)</label
  >
  <label class="check"
    ><input type="checkbox" id="apShowModelToast" /> Показувати тост моделі (зміна через
    Alt+C)</label
  >
  <label class="check"
    ><input type="checkbox" id="apShowFrameActivity" /> Показувати дебагер активності iframe
    (👁)</label
  >

  <button type="button" class="btn-secondary" id="apResetBtn">Скинути до дефолтних</button>
</section>
