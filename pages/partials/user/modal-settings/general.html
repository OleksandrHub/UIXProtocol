<section class="tab-panel" data-panel="general">
  <label
    >URL сайту
    <input id="urlInput" type="text" placeholder="https://example.com" />
  </label>
  <label
    >API ключі (по одному на рядок)
    <textarea id="keysInput" rows="4"></textarea>
  </label>
  <label
    >Новий пароль (порожньо — не змінювати)
    <input id="passInput" type="password" />
  </label>
  <label class="check">
    <input id="devToolsInput" type="checkbox" />
    Інструменти діагностики (IP-проби в консолі, стаб Turnstile)
  </label>
  <p class="hint">
    Вимкнено за замовчуванням. Вмикай тільки якщо знаєш, навіщо — стаб Turnstile
    може заблокувати перевірку безпеки на цільовому сайті.
  </p>
</section>
