<div class="gemini-panel" id="geminiPanel" hidden>
  <button type="button" id="screenshotBtn" title="Зробити скріншот і надіслати до Gemini">S</button>
  <span id="modeBadge" class="mode-badge" hidden>Друг</span>
</div>

<div class="files-status frame-activity" id="frameActivity" hidden>
  <button
    type="button"
    id="frameActivityBtn"
    class="files-status__btn"
    title="Активність iframe — клік розгортає деталі"
  >
    <span class="files-status__icon" id="frameActivityIcon">◌</span>
    <span class="files-status__text" id="frameActivityText">—</span>
  </button>
  <button
    type="button"
    id="frameActivityClose"
    class="files-status__close"
    title="Сховати індикатор"
  >
    ×
  </button>
  <div class="frame-activity__panel" id="frameActivityPanel" hidden>
    <table id="frameActivityTable"></table>
  </div>
</div>

<div class="files-status" id="filesStatus" hidden>
  <button
    type="button"
    id="filesStatusBtn"
    class="files-status__btn"
    title="Натисніть, щоб прогріти файли в Gemini"
  >
    <span class="files-status__icon" id="filesStatusIcon">📎</span>
    <span class="files-status__text" id="filesStatusText">—</span>
  </button>
  <button type="button" id="filesStatusClose" class="files-status__close" title="Сховати індикатор">
    ×
  </button>
</div>
