<div class="gemini-panel" id="geminiPanel" hidden>
  <button type="button" id="screenshotBtn" title="Зробити скріншот і надіслати до Gemini">S</button>
</div>

<div class="files-status" id="filesStatus" hidden>
  <button
    type="button"
    id="filesStatusBtn"
    class="files-status__btn"
    title="Натисніть, щоб прогріти файли в Gemini"
  >
    <span class="files-status__icon" id="filesStatusIcon">📎</span>
    <span class="files-status__text" id="filesStatusText">—</span>
  </button>
  <button type="button" id="filesStatusClose" class="files-status__close" title="Сховати індикатор">
    ×
  </button>
</div>
