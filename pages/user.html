<!doctype html>
<html lang="uk">
  <head>
    <include
      src="partials/head.html"
      locals='{"title": "User", "favicon": "/_p/favicon.ico"}'
    ></include>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas-pro@1.5.8/dist/html2canvas-pro.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body class="page-user">
    <include src="partials/user/header.html"></include>

    <iframe id="frame" class="frame" frameborder="0"></iframe>

    <include src="partials/user/screenshot-and-file-status.html"></include>

    <div class="gemini-result" id="geminiResult" hidden></div>
    <div class="model-toast" id="modelToast" hidden></div>
    <div class="friend-toast" id="friendToast" hidden></div>

    <div class="quicklogin" id="quicklogin" hidden>
      <span class="quicklogin__hint">L</span>
      <input
        class="quicklogin__input"
        id="quickloginInput"
        type="text"
        inputmode="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Quick login"
      />
    </div>

    <include src="partials/user/modal-settings.html"></include>

    <include src="partials/user/modal-archive.html"></include>

    <include src="partials/user/modal-friend-chat.html"></include>

    <include src="partials/user/modal-friend-request.html"></include>

    <div class="onboarding" id="onboarding" hidden>
      <div class="onboarding__avatar" id="onboardingAvatar">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" class="onboarding__frog" aria-hidden="true">
          <ellipse cx="200" cy="370" rx="130" ry="14" fill="rgba(0,0,0,0.22)" />

          <!-- Hood (behind head) -->
          <path d="M 60 200 Q 60 110 200 90 Q 340 110 340 200 Q 340 260 290 270 L 110 270 Q 60 260 60 200 Z" fill="#1a1a24" stroke="#05050a" stroke-width="5" />

          <!-- Hoodie body -->
          <path d="M 75 360 L 95 260 Q 125 240 200 240 Q 275 240 305 260 L 325 360 Z" fill="#1a1a24" stroke="#05050a" stroke-width="5" />
          <!-- Hoodie strings -->
          <line x1="180" y1="265" x2="180" y2="310" stroke="#05050a" stroke-width="3" />
          <line x1="220" y1="265" x2="220" y2="310" stroke="#05050a" stroke-width="3" />
          <circle cx="180" cy="313" r="4" fill="#3a3a4a" />
          <circle cx="220" cy="313" r="4" fill="#3a3a4a" />

          <!-- Floating terminal cursor (hacker vibe) -->
          <g class="onboarding__cursor">
            <text x="50" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700" fill="#00ff41" stroke="#003314" stroke-width="0.5">&gt;_</text>
          </g>

          <!-- Frog head -->
          <ellipse cx="200" cy="210" rx="120" ry="95" fill="#5ba84a" stroke="#2d5a1f" stroke-width="5" />
          <!-- Cheek warts -->
          <circle cx="120" cy="230" r="5" fill="#3d7a26" />
          <circle cx="135" cy="245" r="3" fill="#3d7a26" />
          <circle cx="280" cy="230" r="5" fill="#3d7a26" />
          <circle cx="265" cy="245" r="3" fill="#3d7a26" />
          <!-- Head highlight -->
          <ellipse cx="170" cy="175" rx="38" ry="22" fill="#7dc758" opacity="0.55" />

          <!-- Eye bumps (frog characteristic, behind eyes) -->
          <circle cx="145" cy="140" r="42" fill="#5ba84a" stroke="#2d5a1f" stroke-width="5" />
          <circle cx="255" cy="140" r="42" fill="#5ba84a" stroke="#2d5a1f" stroke-width="5" />

          <!-- Faces -->
          <g id="face-happy">
            <circle cx="145" cy="140" r="30" fill="#fff" stroke="#05050a" stroke-width="4" />
            <circle cx="149" cy="143" r="15" fill="#05050a" />
            <circle cx="145" cy="138" r="5" fill="#fff" />
            <circle cx="255" cy="140" r="30" fill="#fff" stroke="#05050a" stroke-width="4" />
            <circle cx="259" cy="143" r="15" fill="#05050a" />
            <circle cx="255" cy="138" r="5" fill="#fff" />
            <path d="M 125 235 Q 200 295 275 235" fill="none" stroke="#05050a" stroke-width="6" stroke-linecap="round" />
          </g>

          <g id="face-wink" opacity="0">
            <circle cx="145" cy="140" r="30" fill="#fff" stroke="#05050a" stroke-width="4" />
            <circle cx="149" cy="143" r="15" fill="#05050a" />
            <circle cx="145" cy="138" r="5" fill="#fff" />
            <path d="M 225 140 Q 255 165 285 140" fill="none" stroke="#05050a" stroke-width="7" stroke-linecap="round" />
            <path d="M 145 245 Q 220 275 270 240" fill="none" stroke="#05050a" stroke-width="6" stroke-linecap="round" />
          </g>

          <g id="face-surprised" opacity="0">
            <circle cx="145" cy="140" r="32" fill="#fff" stroke="#05050a" stroke-width="4" />
            <circle cx="145" cy="140" r="7" fill="#05050a" />
            <circle cx="255" cy="140" r="32" fill="#fff" stroke="#05050a" stroke-width="4" />
            <circle cx="255" cy="140" r="7" fill="#05050a" />
            <ellipse cx="200" cy="250" rx="22" ry="16" fill="#05050a" />
          </g>

          <g id="face-thinking" opacity="0">
            <circle cx="145" cy="140" r="30" fill="#fff" stroke="#05050a" stroke-width="4" />
            <circle cx="145" cy="128" r="13" fill="#05050a" />
            <circle cx="255" cy="140" r="30" fill="#fff" stroke="#05050a" stroke-width="4" />
            <circle cx="255" cy="128" r="13" fill="#05050a" />
            <path d="M 155 245 Q 175 232 200 245 Q 225 258 245 245" fill="none" stroke="#05050a" stroke-width="6" stroke-linecap="round" />
          </g>

          <g id="face-sleeping" opacity="0">
            <path d="M 115 140 Q 145 122 175 140" fill="none" stroke="#05050a" stroke-width="6" stroke-linecap="round" />
            <path d="M 225 140 Q 255 122 285 140" fill="none" stroke="#05050a" stroke-width="6" stroke-linecap="round" />
            <ellipse cx="200" cy="245" rx="16" ry="10" fill="#05050a" />
            <text x="290" y="100" font-family="ui-monospace, monospace" font-size="32" font-weight="700" fill="#05050a">z</text>
            <text x="320" y="75" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#05050a">z</text>
            <text x="340" y="55" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#05050a">z</text>
          </g>
        </svg>
      </div>
      <div class="onboarding__bubble">
        <button
          type="button"
          id="onboardingClose"
          class="onboarding__close"
          title="Більше не показувати"
          aria-label="Закрити"
        >×</button>
        <div class="onboarding__text" id="onboardingText"></div>
        <div class="onboarding__nav">
          <span class="onboarding__progress" id="onboardingProgress"></span>
          <button type="button" class="onboarding__skip" id="onboardingSkip">Пропустити</button>
          <button type="button" class="onboarding__next" id="onboardingNext">Далі →</button>
        </div>
      </div>
    </div>

    <include src="partials/template/prompt.html"></include>

    <script type="module" src="/js/user.js"></script>
  </body>
</html>
