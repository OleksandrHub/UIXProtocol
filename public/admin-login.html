<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-login">
  <form class="card" id="form">
    <h1>Адмін</h1>
    <input id="name" type="text" placeholder="Ім'я" autocomplete="username" required autofocus>
    <input id="password" type="password" placeholder="Пароль" autocomplete="current-password" required>
    <div class="error" id="error"></div>
    <button type="submit" id="submit">Увійти</button>
    <a class="link" href="/">До звичайного входу</a>
  </form>
  <script type="module" src="/static/admin-login.js"></script>
</body>
</html>
