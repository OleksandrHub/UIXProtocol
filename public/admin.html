<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-admin">
  <div class="admin">
    <header class="admin__header">
      <h1>Користувачі</h1>
      <span class="admin__spacer"></span>
      <a href="/" class="btn">До свого акаунта</a>
      <button type="button" id="logoutBtn" class="btn">Вихід</button>
    </header>

    <div class="error" id="error"></div>

    <section class="section">
      <h2 id="formTitle">Створити користувача</h2>
      <form id="form" class="form">
        <input type="hidden" id="userId">
        <label>Ім'я <input id="name" type="text" required></label>
        <label>Пароль <input id="password" type="password" placeholder=""></label>
        <label>URL <input id="targetUrl" type="text" placeholder="https://example.com"></label>
        <label>API ключі (по одному на рядок)
          <textarea id="apiKeys" rows="3"></textarea>
        </label>
        <label class="check"><input id="isAdmin" type="checkbox"> Адмін</label>
        <div class="form__actions">
          <button type="button" id="resetBtn">Очистити</button>
          <button type="submit" id="submitBtn">Створити</button>
        </div>
      </form>
    </section>

    <section class="section">
      <h2>Список</h2>
      <table class="table">
        <thead>
          <tr><th>ID</th><th>Ім'я</th><th>Адмін</th><th>URL</th><th>Ключів</th><th></th></tr>
        </thead>
        <tbody id="users"></tbody>
      </table>
    </section>
  </div>

  <script type="module" src="/static/admin.js"></script>
</body>
</html>
