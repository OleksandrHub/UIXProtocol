<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title id="title">User</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="page-user">
  <div class="bar-trigger" id="barTrigger" hidden></div>
  <header class="bar" id="bar" hidden>
    <span class="user" id="userName">…</span>
    <button type="button" id="settingsBtn">Налаштування</button>
    <a id="adminLink" href="/admin" hidden>Адмін</a>
    <button type="button" id="logoutBtn">Вихід</button>
  </header>
  <iframe id="frame" class="frame" frameborder="0"></iframe>

  <form class="modal-quicklogin" id="loginForm" hidden autocomplete="off">
    <input id="loginPassword" type="password" autocomplete="current-password" required>
  </form>

  <div class="modal" id="settings" hidden>
    <div class="modal__card">
      <h2>Налаштування</h2>
      <label>URL сайту
        <input id="urlInput" type="text" placeholder="https://example.com">
      </label>
      <label>API ключі (по одному на рядок)
        <textarea id="keysInput" rows="4"></textarea>
      </label>
      <label>Новий пароль (порожньо — не змінювати)
        <input id="passInput" type="password">
      </label>
      <div class="error" id="settingsError"></div>
      <div class="modal__actions">
        <button type="button" id="settingsCancel">Скасувати</button>
        <button type="button" id="settingsSave">Зберегти</button>
      </div>
    </div>
  </div>

  <script type="module" src="/static/user.js"></script>
</body>
</html>
