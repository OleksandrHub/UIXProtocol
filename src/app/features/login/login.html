<form class="login" (ngSubmit)="onSubmit()" #f="ngForm">
  <h1>Sign in</h1>
  <input
    name="name"
    type="text"
    placeholder="Name"
    autocomplete="username"
    [(ngModel)]="name"
    required
  />
  <input
    name="password"
    type="password"
    placeholder="Password"
    autocomplete="current-password"
    [(ngModel)]="password"
    required
  />
  @if (error(); as msg) {
    <div class="login__error">{{ msg }}</div>
  }
  <button type="submit" [disabled]="loading() || !f.valid">
    {{ loading() ? 'Signing in...' : 'Sign in' }}
  </button>
</form>
